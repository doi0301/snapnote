# 수동 실행: Windows NSIS 빌드. Secrets 에 인증서를 넣으면 서명까지 시도합니다.
# - WINDOWS_CSC_LINK: electron-builder 문서 기준 (파일 경로·URL·base64 등)
# - WINDOWS_CSC_KEY_PASSWORD: PFX 비밀번호
# Secrets 가 비어 있으면 서명 없이 빌드합니다 (로컬 npm run build:win 과 동일).
name: Build Windows release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build installer
        run: npm run build:win
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: snapnote-win-dist
          path: dist/*
          if-no-files-found: error
