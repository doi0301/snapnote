# Windows에서 Electron 앱 빌드 후 핵심 E2E (core-flows만)
name: E2E Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build renderer + main (out/)
        run: npm run build

      - name: Playwright E2E (core flows)
        run: npx playwright test e2e/core-flows.spec.ts
